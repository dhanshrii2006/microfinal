<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acadify - Login</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-header h1 {
            color: #667eea;
            font-size: 28px;
            margin-bottom: 10px;
        }

        .login-header p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .login-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            color: #e74c3c;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .success-message {
            color: #27ae60;
            font-size: 13px;
            margin-top: 5px;
            display: none;
        }

        .demo-label {
            background: #f0f0f0;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 12px;
            color: #666;
        }

        .demo-label strong {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }

        .demo-credential {
            margin: 5px 0;
            font-family: monospace;
        }

        .loading-spinner {
            display: none;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1>Acadify</h1>
            <p>Learning Management System</p>
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email Address</label>
                <input 
                    type="email" 
                    id="email" 
                    name="email" 
                    required 
                    placeholder="Enter your email"
                >
                <div class="error-message" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input 
                    type="password" 
                    id="password" 
                    name="password" 
                    required 
                    placeholder="Enter your password"
                >
                <div class="error-message" id="passwordError"></div>
            </div>

            <div id="generalError" class="error-message" style="display: block; margin-bottom: 15px;"></div>

            <button type="submit" class="login-btn" id="loginBtn">
                <span id="btnText">Login</span>
                <div class="loading-spinner" id="spinner"></div>
            </button>
        </form>

        <div class="demo-label">
            <strong>Demo Credentials (after setup):</strong>
            <div class="demo-credential">📚 Admin: admin@acadify.dev</div>
            <div class="demo-credential">👨‍🏫 Teacher: teacher@acadify.dev</div>
            <div class="demo-credential">👨‍🎓 Student: student@acadify.dev</div>
            <div class="demo-credential">🔑 Password: password123</div>
        </div>
    </div>

    <script type="module">
        import { authAPI, handleAPIError, setUser, redirectToDashboard } from './api.js';

        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const generalError = document.getElementById('generalError');
        const spinner = document.getElementById('spinner');
        const btnText = document.getElementById('btnText');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Clear previous errors
            generalError.style.display = 'none';
            generalError.textContent = '';

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                generalError.textContent = 'Please fill in all fields';
                generalError.style.display = 'block';
                return;
            }

            // Disable button and show spinner
            loginBtn.disabled = true;
            spinner.style.display = 'block';
            btnText.textContent = 'Logging in...';

            try {
                const response = await authAPI.login(email, password);

                if (response.error) {
                    generalError.textContent = response.message || 'Login failed. Please check your credentials.';
                    generalError.style.display = 'block';
                } else if (response.user) {
                    // Store user and redirect to dashboard
                    setUser(response.user);
                    redirectToDashboard();
                } else {
                    generalError.textContent = 'Unexpected response. Please try again.';
                    generalError.style.display = 'block';
                }
            } catch (error) {
                generalError.textContent = 'Unable to connect to server. Make sure Acadify backend is running on port 5000.';
                generalError.style.display = 'block';
                console.error('Login error:', error);
            } finally {
                // Re-enable button
                loginBtn.disabled = false;
                spinner.style.display = 'none';
                btnText.textContent = 'Login';
            }
        });

        // Auto-fill demo credentials for testing (optional)
        if (new URLSearchParams(window.location.search).get('demo') === 'true') {
            emailInput.value = 'student@acadify.dev';
            passwordInput.value = 'password123';
        }
    </script>
</body>
</html>
