<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Courses - Acadify</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <h2>📚 Acadify</h2>
            <ul>
                <li onclick="navigateTo('dashboard.html')">Dashboard</li>
                <li class="active" onclick="navigateTo('my-courses.html')">My Courses</li>
                <li onclick="navigateTo('browse-courses.html')">Browse Courses</li>
                <li onclick="navigateTo('lesson.html')">Lessons</li>
                <li onclick="navigateTo('quiz.html')">Quizzes</li>
                <li onclick="navigateTo('assignment.html')">Assignments</li>
                <li onclick="navigateTo('progress.html')">Progress</li>
                <li onclick="navigateTo('setting.html')">Settings</li>
            </ul>
        </div>

        <div class="main">
            <div class="topbar">
                <div class="topbar-left">
                    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
                    <input type="text" class="search-box" placeholder="Search courses...">
                </div>
                <div class="topbar-right">
                    <div class="profile">
                        <div class="profile-avatar" id="profileAvatar">U</div>
                        <span id="currentUser">User</span>
                        <button id="logoutBtn" class="btn-logout">Logout</button>
                    </div>
                </div>
            </div>

            <div class="page-container">
                <h2>My Courses</h2>
                <p style="margin-bottom: 20px; color: #666;">Courses you're enrolled in</p>
                <div class="courses-grid" id="coursesGrid">
                    <p style="grid-column: 1/-1; text-align: center; color: #999;">Loading...</p>
                </div>
            </div>
        </div>
    </div>

    <style>
        .btn-logout { margin-left: 10px; padding: 6px 12px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
    </style>

    <script type="module">
        import { authAPI, clearUser, redirectToLogin, coursesAPI } from './api.js';
        window.navigateTo = (p) => window.location.href = p;
        window.toggleSidebar = () => document.querySelector('.sidebar').classList.toggle('collapsed');
        
        async function initPage() {
            try {
                const user = await authAPI.getCurrentUser();
                if (!user?.id) redirectToLogin();
                document.getElementById('currentUser').textContent = user.name || user.email.split('@')[0];
                document.getElementById('profileAvatar').textContent = (user.name || user.email).charAt(0).toUpperCase();
                await loadCourses();
            } catch (e) { redirectToLogin(); }
        }
        
        async function loadCourses() {
            try {
                const courses = await coursesAPI.getCourses();
                const grid = document.getElementById('coursesGrid');
                grid.innerHTML = (!courses?.length ? '<p style="grid-column: 1/-1; text-align: center; color: #999;">No courses. <a href="browse-courses.html">Browse courses</a></p>' : 
                    courses.map(c => `<div class="course-card"><div class="course-card-header">${c.title}</div><div class="course-card-body"><h3>${c.title}</h3><p>by ${c.instructor_name}</p><div class="progress-bar-container"><div class="progress-bar"><div class="progress-fill" style="width: ${c.progress || 0}%"></div></div><div class="progress-text">${c.progress || 0}%</div></div></div></div>`).join(''));
            } catch (e) { document.getElementById('coursesGrid').innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999;">Error loading courses</p>'; }
        }
        
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try { await authAPI.logout(); } catch (e) {}
            clearUser();
            redirectToLogin();
        });
        
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
