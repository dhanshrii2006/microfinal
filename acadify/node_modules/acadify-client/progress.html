<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress - Acadify</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <h2>📚 Acadify</h2>
            <ul>
                <li onclick="navigateTo('dashboard.html')">Dashboard</li>
                <li onclick="navigateTo('my-courses.html')">My Courses</li>
                <li onclick="navigateTo('browse-courses.html')">Browse Courses</li>
                <li onclick="navigateTo('lesson.html')">Lessons</li>
                <li onclick="navigateTo('quiz.html')">Quizzes</li>
                <li onclick="navigateTo('assignment.html')">Assignments</li>
                <li class="active" onclick="navigateTo('progress.html')">Progress</li>
                <li onclick="navigateTo('setting.html')">Settings</li>
            </ul>
        </div>

        <div class="main">
            <div class="topbar">
                <div class="topbar-left">
                    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
                    <input type="text" class="search-box" placeholder="Track progress...">
                </div>
                <div class="topbar-right">
                    <div class="profile">
                        <div class="profile-avatar" id="profileAvatar">U</div>
                        <span id="currentUser">User</span>
                        <button id="logoutBtn" class="btn-logout">Logout</button>
                    </div>
                </div>
            </div>

            <div class="page-container">
                <h2>📊 Your Progress</h2>
                <p style="margin-bottom: 20px; color: #666;">Track your learning progress</p>
                <div style="max-width: 500px; margin-bottom: 30px;">
                    <canvas id="progressChart"></canvas>
                </div>
                <div id="progressStats" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                    <div class="card">
                        <h4>Total Hours</h4>
                        <div class="card-number">0</div>
                    </div>
                    <div class="card">
                        <h4>Completion</h4>
                        <div class="card-number">0%</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .btn-logout { margin-left: 10px; padding: 6px 12px; background: #e74c3c; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: 600; }
    </style>

    <script type="module">
        import { authAPI, clearUser, redirectToLogin } from './api.js';
        window.navigateTo = (p) => window.location.href = p;
        window.toggleSidebar = () => document.querySelector('.sidebar').classList.toggle('collapsed');
        
        async function initPage() {
            try {
                const user = await authAPI.getCurrentUser();
                if (!user?.id) redirectToLogin();
                document.getElementById('currentUser').textContent = user.name || user.email.split('@')[0];
                document.getElementById('profileAvatar').textContent = (user.name || user.email).charAt(0).toUpperCase();
                initChart();
            } catch (e) { redirectToLogin(); }
        }
        
        function initChart() {
            new Chart(document.getElementById('progressChart'), {
                type: 'doughnut',
                data: {
                    labels: ['Completed', 'In Progress', 'Not Started'],
                    datasets: [{
                        data: [35, 45, 20],
                        backgroundColor: ['#27ae60', '#f39c12', '#bdc3c7']
                    }]
                }
            });
        }
        
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try { await authAPI.logout(); } catch (e) {}
            clearUser();
            redirectToLogin();
        });
        
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
