<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachers - Acadify Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout">
        <div class="sidebar">
            <h2>📚 Acadify</h2>
            <ul>
                <li onclick="navigateTo('admin-dashboard.html')">Dashboard</li>
                <li onclick="navigateTo('admin-users.html')">Users Management</li>
                <li onclick="navigateTo('admin-courses.html')">Courses</li>
                <li class="active" onclick="navigateTo('admin-teachers.html')">Teachers</li>
                <li onclick="navigateTo('admin-students.html')">Students</li>
                <li onclick="navigateTo('admin-analytics.html')">Analytics</li>
                <li onclick="navigateTo('admin-reports.html')">Reports</li>
                <li onclick="navigateTo('admin-settings.html')">Settings</li>
                <li onclick="logout()">Logout</li>
            </ul>
        </div>
        <div class="main">
            <div class="topbar">
                <div class="topbar-left">
                    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
                    <input type="text" class="search-box" placeholder="Search teachers...">
                </div>
                <div class="topbar-right">
                    <div class="profile">
                        <div class="profile-avatar" id="profileInitials">AD</div>
                        <span id="profileName">Admin</span>
                    </div>
                </div>
            </div>
            <div class="page-container">
                <div class="welcome">
                    <h2>Teachers</h2>
                    <p>Manage faculty and instructors</p>
                </div>
                <div style="padding: 40px; text-align: center; background: #f5f7fa; border-radius: 12px; margin-top: 20px;">
                    <h3 style="color: #666; margin-bottom: 10px;">🚀 Coming Soon</h3>
                    <p style="color: #999;">Teacher management interface is under development.</p>
                </div>
            </div>
        </div>
    </div>
    <script src="auth.js"></script>
    <script src="dashboard.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            checkAuth('admin');
            const userName = localStorage.getItem('userName') || 'Admin';
            const userInitials = localStorage.getItem('userInitials') || 'AD';
            document.getElementById('profileName').textContent = userName;
            document.getElementById('profileInitials').textContent = userInitials;
        });
    </script>
</body>
</html>
